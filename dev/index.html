<!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>&lt;ds-button> Demo</title>
    <link rel="stylesheet" href="../src/tokens/colors.css" />
    <link rel="stylesheet" href="../src/tokens/typography.css" />
    <link rel="stylesheet" href="../src/tokens/spacing.css" />
    <style>
      body {
        font-family: var(--ds-font-family-sans);
        background-color: var(--ds-bg-app);
        color: var(--ds-color-dark);
        margin: 0;
        padding: 40px;
        transition: background-color 0.3s, color 0.3s;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
      }
      .theme-toggle {
        cursor: pointer;
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid var(--ds-border-base);
        background: var(--ds-bg-surface);
        color: var(--ds-color-dark);
        font-weight: bold;
      }
    </style>
    <script src="../node_modules/@webcomponents/webcomponentsjs/webcomponents-loader.js"></script>
    <script src="../node_modules/lit/polyfill-support.js"></script>
    <script type="module" src="../index.js"></script>
    <style>
      p {
        border: solid 1px blue;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Portfolio Design System Demo</h1>
      <button id="theme-switcher" class="theme-toggle">🌙 Dark Mode</button>
    </header>

    <script>
      const btn = document.getElementById('theme-switcher');
      btn.addEventListener('click', () => {
        const isDark = document.body.classList.toggle('dark');
        btn.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
      });
    </script>

    <section>
      <h2>Buttons</h2>
      <div 
        id="button-container" 
        style="display: flex; flex-direction: column; gap: 20px; padding: 20px; background: var(--ds-bg-surface); border-radius: 12px; border: 1px solid var(--ds-border-base);"
      >
        <div style="display: flex; gap: 10px">
          <ds-button label="Primary" variant="primary"></ds-button>
          <ds-button label="Slate" variant="slate"></ds-button>
          <ds-button label="Danger" variant="danger"></ds-button>
          <ds-button label="Ghost" variant="ghost"></ds-button>
        </div>
        <div style="display: flex; gap: 10px">
          <ds-button label="Primary" variant="primary" disabled></ds-button>
          <ds-button label="Slate" variant="slate" disabled></ds-button>
          <ds-button label="Danger" variant="danger" disabled></ds-button>
          <ds-button label="Ghost" variant="ghost" disabled></ds-button>
        </div>
        <div style="display: flex; gap: 10px">
          <ds-button
            label="Add Item"
            variant="primary"
            iconPrefix="add"
          ></ds-button>
          <ds-button
            label="Settings"
            variant="slate"
            iconSuffix="settings"
          ></ds-button>
          <ds-button
            label="Warning"
            variant="danger"
            iconPrefix="warning"
            iconSuffix="arrow_forward"
          ></ds-button>
          <ds-button
            label="Search"
            variant="ghost"
            iconPrefix="search"
          ></ds-button>
        </div>
        <div style="display: flex; gap: 10px">
          <ds-button variant="primary" label="Primary with Icon">
            <span class="material-symbols-outlined">rocket</span>
          </ds-button>
          <ds-button variant="primary" label="Primary with Emoji">🔥</ds-button>
        </div>
        <div style="display: flex; gap: 10px; align-items: center">
          <ds-button variant="icon"
            ><span class="material-symbols-outlined">😂</span></ds-button
          >
          <ds-button variant="icon" variant="slate"
            ><span class="material-symbols-outlined">share</span></ds-button
          >
          <ds-button variant="icon" tiny
            ><span class="material-symbols-outlined">close</span></ds-button
          >
          <ds-button variant="icon" disabled
            ><span class="material-symbols-outlined">lock</span></ds-button
          >
        </div>
        <div style="display: flex; gap: 10px">
          <ds-button
            label="Custom Styled"
            variant="primary"
            style="--ds-color-primary: #8b5cf6; border-radius: 999px"
          ></ds-button>
          <ds-button
            label="Part Styled"
            id="part-button"
            variant="ghost"
          ></ds-button>
          <style>
            #part-button::part(button) {
              border: 2px dashed #135bec;
              color: #135bec;
              font-weight: 900;
            }
          </style>
        </div>
      </div>
    </section>

    <section>
      <h2>Layout & Navigation</h2>
      <ds-navbar label="DsNavbar"></ds-navbar>
      <ds-hero label="DsHero"></ds-hero>
    </section>

    <section>
      <h2>Components</h2>
      <ds-card label="DsCard"></ds-card>
      <ds-badge label="DsBadge"></ds-badge>
      <ds-tag label="DsTag"></ds-tag>
      <ds-avatar label="DsAvatar"></ds-avatar>
      <ds-banner label="DsBanner"></ds-banner>
      <ds-tooltip label="DsTooltip"></ds-tooltip>
      <ds-skeleton label="DsSkeleton"></ds-skeleton>
    </section>

    <section>
      <h2>Forms</h2>
      <ds-input label="DsInput"></ds-input>
    </section>
  </body>
</html>
